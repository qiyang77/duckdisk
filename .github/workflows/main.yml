name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install app dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Build app
        run: npm run tauri build

      - name: Rename DMG to arm64
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          dmg_dir="src-tauri/target/release/bundle/dmg"
          src="$dmg_dir/DuckDisk_${version}_aarch64.dmg"
          dst="$dmg_dir/DuckDisk_${version}_arm64.dmg"
          test -f "$src"
          rm -f "$dst"
          mv "$src" "$dst"
          echo "DMG_PATH=$dst" >> "$GITHUB_ENV"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "DuckDisk $GITHUB_REF_NAME" \
              --notes "DuckDisk macOS arm64 build."
          fi
          gh release upload "$GITHUB_REF_NAME" "$DMG_PATH" --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuckDisk-arm64-dmg
          path: ${{ env.DMG_PATH }}
